run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - goconst
    - gosec
    - prealloc

linters-settings:
  govet:
    check-shadowing: true
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/codeflow/orchestrator
  misspell:
    locale: US
  goconst:
    min-len: 3
    min-occurrences: 3
  gosec:
    excludes:
      - G104  # audit errors not checked

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - goconst
    - path: cmd/
      linters:
        - goconst
  max-issues-per-linter: 50
  max-same-issues: 10
